

        <!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Seyednourani | Strategic Legacy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap');
        :root { --gold: #c5a059; --navy: #060d1a; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Vazirmatn', sans-serif; background: var(--navy); color: white; overflow-x: hidden; }

        header { 
            position: fixed; top: 0; width: 100%; padding: 25px 8%; 
            display: flex; justify-content: space-between; z-index: 1000; 
            background: rgba(6, 13, 26, 0.3); backdrop-filter: blur(10px);
        }
        .logo { color: var(--gold); font-weight: 700; letter-spacing: 4px; font-size: 1rem; }

        section { height: 100vh; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .bg-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            background-attachment: fixed;
            transition: transform 2.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1;
        }
        .active .bg-img { transform: scale(1.1); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); z-index: 2; }

        /* لایه کلیک نامرئی که روی دکمه‌های عکس شما تنظیم شده */
        .click-area {
            position: absolute; z-index: 100;
            width: 400px; height: 120px;
            bottom: 12%; cursor: pointer;
            background: rgba(255,255,255,0);
        }

        #p1 .bg-img { background-image: url('hero-me.jpg'); }
        #p2 .bg-img { background-image: url('wisdom.jpg'); }
        #p3 .bg-img { background-image: url('protection.jpg'); }
        #p4 .bg-img { background-image: url('future.jpg'); }
        #p5 { background: radial-gradient(circle, #0a192f, #060d1a); z-index: 10; }
        #p6 .bg-img { background-image: url('legacy.jpg'); }
        #p7 .bg-img { background-image: url('contact-bg.jpg'); }

        /* استایل هاب ارتباطی (صفحه ۵) */
        .hub-container { position: relative; z-index: 20; text-align: center; width: 90%; max-width: 900px; }
        .hub-grid { display: flex; justify-content: space-around; margin-top: 50px; flex-wrap: wrap; gap: 20px; }
        .hub-node { 
            text-decoration: none; color: #c5a059; border: 1px solid rgba(197,160,89,0.2); 
            padding: 30px; transition: 0.5s; background: rgba(255,255,255,0.02); min-width: 180px;
        }
        .hub-node:hover { background: rgba(197,160,89,0.1); transform: translateY(-10px); border-color: #c5a059; box-shadow: 0 0 20px rgba(197,160,89,0.2); }
        .hub-node i { font-size: 2.5rem; margin-bottom: 15px; display: block; }

        /* باکس میراث (صفحه ۶) */
        .legacy-tag {
            position: relative; z-index: 10; background: rgba(197, 160, 89, 0.05);
            backdrop-filter: blur(15px); padding: 35px; border-right: 3px solid var(--gold);
            max-width: 450px; text-align: right; margin-right: 45%;
        }

        /* پنل نهایی تماس (صفحه ۷) */
        .contact-panel {
            position: absolute; z-index: 110; background: rgba(6, 13, 26, 0.95);
            backdrop-filter: blur(25px); padding: 50px; border: 1px solid var(--gold);
            display: none; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        .contact-panel.active-panel { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header><div class="logo">M. SEYEDNOURANI</div></header>

    <section id="p1">
        <div class="bg-img"></div><div class="overlay"></div>
        <div class="click-area" onclick="location.href='#p2'"></div>
    </section>

    <section id="p2"><div class="bg-img"></div></section>
    <section id="p3"><div class="bg-img"></div></section>
    <section id="p4"><div class="bg-img"></div></section>

    <section id="p5">
        <div class="hub-container">
            <h2 style="color:var(--gold); letter-spacing:5px; font-weight:100; margin-bottom:20px;">STRATEGIC HUB</h2>
            <p style="font-style: italic; color: #8892b0; margin-bottom: 40px;">"ثروت، محصولِ قدرتِ تفکر و دقتِ استراتژی است."</p>
            <div class="hub-grid">
                <a href="https://wa.me/14169490179" class="hub-node"><i class="fab fa-whatsapp"></i>WhatsApp</a>
                <a href="tel:+14169490179" class="hub-node"><i class="fas fa-phone"></i>Direct Call</a>
                <a href="mailto:amirsn121@gmail.com" class="hub-node"><i class="far fa-envelope"></i>Email Hub</a>
            </div>
        </div>
    </section>

    <section id="p6">
        <div class="bg-img"></div><div class="overlay"></div>
        <div class="legacy-tag">
            <h2 style="color: var(--gold); font-size: 2.2rem; margin-bottom: 10px;">THE LEGACY</h2>
            <p style="color: #ccd6f6; font-weight: 100; line-height: 1.8;">ساختن میراثی که فراتر از زمان حرکت کند.<br>Architecting a future that endures.</p>
        </div>
    </section>

    <section id="p7">
        <div class="bg-img"></div><div class="overlay"></div>
        <div class="click-area" style="bottom: 18%; width: 420px;" onclick="document.getElementById('infoPanel').classList.add('active-panel')"></div>
        
        <div id="infoPanel" class="contact-panel">
            <h2 style="color:var(--gold); margin-bottom:25px; letter-spacing:2px;">DIRECT CONNECTION</h2>
            <p style="font-size:1.4rem; margin-bottom:10px; color:white;">+1 416 949 0179</p>
            <p style="color:#8892b0; margin-bottom:30px;">amirsn121@gmail.com</p>
            <a href="mailto:amirsn121@gmail.com" style="text-decoration:none; color:var(--gold); border:1px solid var(--gold); padding:12px 30px; font-weight:bold;">SEND MESSAGE</a>
            <br><br><br>
            <span onclick="document.getElementById('infoPanel').classList.remove('active-panel')" style="cursor:pointer; color:rgba(255,255,255,0.3); font-size:0.8rem;">[ CLOSE X ]</span>
        </div>
    </section>

    <script>
        // فعال‌سازی افکت‌های حرکتی هنگام اسکرول
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
                else entry.target.classList.remove('active');
            });
        }, { threshold: 0.5 });
        document.querySelectorAll('section').forEach(s => observer.observe(s));
    </script>
</body>
</html>
